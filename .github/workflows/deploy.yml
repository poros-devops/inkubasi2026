name: Moderno CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Pengecekan Server (NestJS)
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: cd server && npm install

      - name: Build Server
        run: cd server && npm run build

  # Job 2: Pengecekan Client (Next.js)
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: cd client && npm install

      - name: Build Client (Bypass Mode)
        run: |
          cd client
          export NEXT_IGNORE_ESLINT=1
          export NEXT_IGNORE_TYPECHECKS=1
          npm run build

  # Job 3: Docker Compose Validation
  docker-test:
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose File
        run: docker compose config
